# ─────────────────────────────────────────────────────────────────
#  EazyBank Frontend — GitHub Actions CI/CD Pipeline
#
#  Jobs:
#    1. lint        → YAML lint + RuboCop (.rubocop.yml)
#    2. test        → npm test (unit tests)
#    3. security    → Trivy image scan + Snyk
#    4. build       → Docker multi-stage build + push to DockerHub
#    5. deploy-dev  → ArgoCD sync to dev (on push to main)
#    6. deploy-prod → ArgoCD sync to prod (on release tag v*)
#
#  Required GitHub Secrets:
#    DOCKERHUB_USERNAME   — DockerHub username
#    DOCKERHUB_TOKEN      — DockerHub access token
#    SNYK_TOKEN           — Snyk API token
#    ARGOCD_SERVER        — ArgoCD server URL (e.g. argocd.eazybank.com)
#    ARGOCD_TOKEN         — ArgoCD API token (create in ArgoCD UI)
#    SLACK_WEBHOOK_URL    — Slack incoming webhook for notifications
# ─────────────────────────────────────────────────────────────────
name: EazyBank Frontend CI/CD

on:
  push:
    branches: [main, develop]
    tags:     ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: eazybytes/eazybank-frontend
  ARGOCD_APP:  eazybank-frontend

jobs:
# ══════════════════════════════════════════════════════════════════
# JOB 1 — Lint (YAML, Dockerfile, RuboCop for Ruby-based tooling)
# ══════════════════════════════════════════════════════════════════
  lint:
    name: Lint & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: YAML lint (K8s manifests)
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: "k8s/"
          config_file: ".yamllint.yml"

      - name: Validate K8s manifests (kubeval)
        run: |
          curl -sL https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz | tar xz
          ./kubeval --strict k8s/*.yaml

      - name: Dockerfile lint (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Setup Ruby (for RuboCop)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: RuboCop (if Ruby files exist)
        run: |
          if [ -f Gemfile ]; then
            gem install rubocop rubocop-rails rubocop-rspec --no-document
            rubocop --config .rubocop.yml --format github
          else
            echo "No Gemfile found — skipping RuboCop"
          fi

# ══════════════════════════════════════════════════════════════════
# JOB 2 — Unit Tests
# ══════════════════════════════════════════════════════════════════
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage --watchAll=false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

# ══════════════════════════════════════════════════════════════════
# JOB 3 — Security Scanning
# ══════════════════════════════════════════════════════════════════
  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      security-events: write   # for SARIF upload to GitHub Security tab
    steps:
      - uses: actions/checkout@v4

      - name: Snyk — dependency vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true          # don't block on informational
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Upload Snyk SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

      - name: Build image for scanning
        run: docker build -t ${{ env.IMAGE_NAME }}:scan-${{ github.sha }} .

      - name: Trivy — image vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:    "${{ env.IMAGE_NAME }}:scan-${{ github.sha }}"
          format:       "sarif"
          output:       "trivy-results.sarif"
          severity:     "HIGH,CRITICAL"
          exit-code:    "1"             # fail on HIGH/CRITICAL

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy — K8s config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type:  "config"
          scan-ref:   "k8s/"
          severity:   "HIGH,CRITICAL"
          exit-code:  "0"              # warn only for config issues

# ══════════════════════════════════════════════════════════════════
# JOB 4 — Build & Push Docker Image
# ══════════════════════════════════════════════════════════════════
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context:     .
          file:        Dockerfile
          target:      production
          push:        ${{ github.event_name != 'pull_request' }}
          tags:        ${{ steps.meta.outputs.tags }}
          labels:      ${{ steps.meta.outputs.labels }}
          cache-from:  type=gha
          cache-to:    type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

      - name: Sign image with Cosign (supply chain security)
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3
        # cosign sign ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Update K8s manifest image tag
        if: github.event_name != 'pull_request'
        run: |
          sed -i "s|image: eazybytes/eazybank-frontend:.*|image: eazybytes/eazybank-frontend:${{ steps.meta.outputs.version }}|g" \
            k8s/04-deployment.yaml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/04-deployment.yaml
          git diff --staged --quiet || git commit -m "chore: bump image to ${{ steps.meta.outputs.version }} [skip ci]"
          git push

# ══════════════════════════════════════════════════════════════════
# JOB 5 — Deploy to Dev (ArgoCD sync on main branch push)
# ══════════════════════════════════════════════════════════════════
  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: development
      url:  "http://${{ secrets.DEV_NODE_IP }}:30080"
    steps:
      - name: Trigger ArgoCD sync (dev)
        run: |
          curl -sSf -X POST \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://${{ secrets.ARGOCD_SERVER }}/api/v1/applications/${{ env.ARGOCD_APP }}/sync" \
            -d '{"prune":true,"dryRun":false}' | jq .

      - name: Wait for ArgoCD health
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sSf \
              -H "Authorization: Bearer ${{ secrets.ARGOCD_TOKEN }}" \
              "https://${{ secrets.ARGOCD_SERVER }}/api/v1/applications/${{ env.ARGOCD_APP }}" | \
              jq -r '.status.health.status')
            echo "ArgoCD health: $STATUS"
            [ "$STATUS" = "Healthy" ] && exit 0
            sleep 10
          done
          echo "ArgoCD did not become Healthy in time" && exit 1

      - name: Smoke test
        run: |
          sleep 15
          curl -sf "http://${{ secrets.DEV_NODE_IP }}:30080/healthz" || exit 1
          echo "Smoke test passed"

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} *EazyBank Frontend* deploy to *dev* ${{ job.status }}\nCommit: ${{ github.sha }}\nBy: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

# ══════════════════════════════════════════════════════════════════
# JOB 6 — Deploy to Production (on version tag v*.*.*)
# ══════════════════════════════════════════════════════════════════
  deploy-prod:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url:  "https://eazybank.example.com"
    steps:
      - name: Require manual approval
        uses: trstringer/manual-approval@v1
        with:
          secret:         ${{ github.TOKEN }}
          approvers:      platform-team
          minimum-approvals: 1
          issue-title:    "Deploy ${{ github.ref_name }} to production"

      - name: ArgoCD production sync
        run: |
          curl -sSf -X POST \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://${{ secrets.ARGOCD_SERVER }}/api/v1/applications/${{ env.ARGOCD_APP }}/sync" \
            -d '{"prune":true,"dryRun":false}' | jq .

      - name: Notify Slack — production deployed
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '🚀' || '🔥' }} *EazyBank Frontend ${{ github.ref_name }}* deployed to *production* — status: ${{ job.status }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
