apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: eazybank

bases:
  - ../../base

# ── Scale up for production ──────────────────────────────────────────
patches:
  - target:
      kind: Deployment
      name: nginx-frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3

# ── Production image tags ─────────────────────────────────────────────
images:
  - name: nginx
    newTag: "1.25-alpine"
  - name: postgres
    newTag: "15-alpine"

# ── Production-specific labels ────────────────────────────────────────
commonLabels:
  env: production

# ── Prod config overrides ─────────────────────────────────────────────
configMapGenerator:
  - name: frontend-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
