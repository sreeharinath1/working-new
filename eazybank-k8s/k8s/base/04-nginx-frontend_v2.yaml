# ════════════════════════════════════════════════════════════════════
# EazyBank — Nginx Frontend
# Multi-container pattern: init container injects Keycloak secret
# into config.js at runtime (never hardcoded in ConfigMap)
# ════════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-frontend
  namespace: eazybank
  labels:
    app: nginx-frontend
    tier: frontend
    app.kubernetes.io/part-of: eazybank
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime deploys
  template:
    metadata:
      labels:
        app: nginx-frontend
        tier: frontend
      annotations:
        # Force pod restart when config changes
        checksum/config: "{{ .Values.configChecksum | default 'initial' }}"
    spec:
      serviceAccountName: eazybank-sa

      # ── Init Container: Inject secret into config.js ─────────────
      initContainers:
        - name: config-injector
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "🔑 Injecting Keycloak secret into config.js..."
              sed "s/__KEYCLOAK_CLIENT_SECRET__/${KC_CLIENT_SECRET}/g" \
                /config-template/config.js > /config-out/config.js
              echo "✅ config.js written:"
              cat /config-out/config.js
          env:
            - name: KC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: frontend-secrets
                  key: keycloak-client-secret
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: config-out
              mountPath: /config-out

      # ── Main Container ────────────────────────────────────────────
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: frontend-html
              mountPath: /usr/share/nginx/html
            - name: config-out           # injected config.js from init
              mountPath: /etc/nginx/conf.d
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

        # ── Sidecar: Log shipper (optional — remove if not needed) ──
        # - name: log-shipper
        #   image: fluent/fluent-bit:latest
        #   volumeMounts:
        #     - name: nginx-logs
        #       mountPath: /var/log/nginx

      volumes:
        - name: nginx-conf
          configMap:
            name: nginx-config
        - name: frontend-html
          configMap:
            name: frontend-html
        - name: config-template
          configMap:
            name: frontend-config
        - name: config-out
          emptyDir: {}             # Shared between init and main container

      # Graceful termination
      terminationGracePeriodSeconds: 30

      # Pod anti-affinity: spread replicas across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - nginx-frontend
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-frontend
  namespace: eazybank
  labels:
    app: nginx-frontend
    app.kubernetes.io/part-of: eazybank
spec:
  type: NodePort
  selector:
    app: nginx-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
---
# ── HorizontalPodAutoscaler ───────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nginx-frontend-hpa
  namespace: eazybank
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
