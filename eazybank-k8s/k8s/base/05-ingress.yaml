# ════════════════════════════════════════════════════════════════════
# EazyBank — Ingress (NGINX Ingress Controller)
#
# Install ingress controller first:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.9.4/deploy/static/provider/baremetal/deploy.yaml
#
# For AWS EKS with ALB:
#   Use 04b-ingress-alb.yaml instead
# ════════════════════════════════════════════════════════════════════

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eazybank-ingress
  namespace: eazybank
  labels:
    app.kubernetes.io/part-of: eazybank
  annotations:
    # ── Ingress class ──
    kubernetes.io/ingress.class: nginx

    # ── SSL redirect ──
    nginx.ingress.kubernetes.io/ssl-redirect: "false"   # set true when TLS configured

    # ── Proxy timeouts (important for Spring Boot startup) ──
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

    # ── CORS (handled by gateway, but belt-and-suspenders) ──
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, eazybank-correlation-id"

    # ── Rate limiting ──
    nginx.ingress.kubernetes.io/limit-rps: "30"

    # ── Rewrite rules ──
    nginx.ingress.kubernetes.io/use-regex: "true"

spec:
  rules:
    # ── Replace with your domain (or use nip.io for EC2 testing) ──
    # e.g.: eazybank.13.233.158.149.nip.io
    - host: eazybank.local                # Change to your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-frontend
                port:
                  number: 80

    # ── Direct API access via subdomain ──
    - host: api.eazybank.local
      http:
        paths:
          - path: /eazybank/
            pathType: Prefix
            backend:
              service:
                name: gatewayserver
                port:
                  number: 8072

  # ── TLS (uncomment after cert-manager is configured) ──
  # tls:
  #   - hosts:
  #       - eazybank.local
  #       - api.eazybank.local
  #     secretName: eazybank-tls-cert

---
