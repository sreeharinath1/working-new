# ════════════════════════════════════════════════════════════════════
# EazyBank — Persistent Storage (Production)
# Replace emptyDir volumes in databases with these PVCs
# ════════════════════════════════════════════════════════════════════

# ── ACCOUNTS DB PVC ──────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: accountsdb-pvc
  namespace: eazybank
  labels:
    app: accountsdb
    app.kubernetes.io/part-of: eazybank
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard          # change to gp2/gp3 on EKS
  resources:
    requests:
      storage: 5Gi
---
