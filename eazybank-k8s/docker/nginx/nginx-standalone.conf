worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;

  server {
    listen 80;
    root /usr/share/nginx/html;
    index eazybank.html;

    location /healthz {
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    location = /config.js {
      root /etc/nginx/conf.d;
      add_header Content-Type application/javascript;
      add_header Cache-Control "no-cache";
    }

    location / {
      try_files $uri $uri/ /eazybank.html;
    }

    # These are set via env vars in docker-compose / K8s
    # Override GATEWAY_HOST and KEYCLOAK_HOST at runtime
    location /eazybank/ {
      proxy_pass http://${GATEWAY_HOST}:${GATEWAY_PORT};
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 120s;
    }

    location /realms/ {
      proxy_pass http://${KEYCLOAK_HOST}:${KEYCLOAK_PORT};
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 120s;
    }
  }
}
