# ─────────────────────────────────────────────────────────────────
#  EazyBank Frontend — Secrets
#
#  PRODUCTION: Use SealedSecret (Bitnami) OR ExternalSecret (ESO)
#  NEVER commit plain Secret to Git.
#
#  Two options shown:
#    Option A — SealedSecret (encrypt with kubeseal, commit safely)
#    Option B — ExternalSecret (pull from AWS Secrets Manager / Vault)
#
#  Also included: image pull secret for private registry.
# ─────────────────────────────────────────────────────────────────

# ══ OPTION A: SealedSecret (recommended for GitOps / ArgoCD) ══════
# Install Sealed Secrets controller first:
#   helm install sealed-secrets sealed-secrets/sealed-secrets \
#     --namespace kube-system
#
# Encrypt your secret:
#   kubectl create secret generic eazybank-frontend-secrets \
#     --namespace eazybank \
#     --from-literal=SLACK_WEBHOOK_URL="https://hooks.slack.com/..." \
#     --from-literal=REGISTRY_PASSWORD="..." \
#     --dry-run=client -o yaml | \
#   kubeseal --controller-namespace kube-system \
#     --format yaml > 03-secret.yaml
#
# The output below is a TEMPLATE — replace encryptedData values
# with your actual kubeseal output before committing.
# ──────────────────────────────────────────────────────────────────
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: eazybank-frontend-secrets
  namespace: eazybank
  labels:
    app.kubernetes.io/name: eazybank-frontend
    app.kubernetes.io/component: secret
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    # ── Replace these with real kubeseal output ───────────────────
    SLACK_WEBHOOK_URL: AgBX...REPLACE_WITH_KUBESEAL_OUTPUT...==
    REGISTRY_PASSWORD: AgBY...REPLACE_WITH_KUBESEAL_OUTPUT...==
    REGISTRY_USERNAME: AgBZ...REPLACE_WITH_KUBESEAL_OUTPUT...==
  template:
    metadata:
      name: eazybank-frontend-secrets
      namespace: eazybank
      labels:
        app.kubernetes.io/name: eazybank-frontend
    type: Opaque
---
# ══ OPTION B: ExternalSecret (pull from AWS Secrets Manager) ═══════
# Install External Secrets Operator first:
#   helm install external-secrets external-secrets/external-secrets \
#     --namespace external-secrets --create-namespace
#
# Uncomment block below and comment out the SealedSecret above.
# ──────────────────────────────────────────────────────────────────
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: eazybank-frontend-secrets
#   namespace: eazybank
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     name: aws-secrets-manager
#     kind: ClusterSecretStore
#   target:
#     name: eazybank-frontend-secrets
#     creationPolicy: Owner
#   data:
#     - secretKey: SLACK_WEBHOOK_URL
#       remoteRef:
#         key: eazybank/frontend/slack-webhook
#     - secretKey: REGISTRY_PASSWORD
#       remoteRef:
#         key: eazybank/frontend/registry-password

---
# ══ Image Pull Secret (registry auth for eazybytes/eazybank-frontend) ═
# Create with:
#   kubectl create secret docker-registry eazybank-registry-secret \
#     --namespace eazybank \
#     --docker-server=https://index.docker.io/v1/ \
#     --docker-username=YOUR_DOCKERHUB_USER \
#     --docker-password=YOUR_TOKEN \
#     --docker-email=platform-team@eazybytes.com
#
# Then seal it with kubeseal the same way as above.
# Below is the plain format — NEVER commit this to Git as-is.
# ──────────────────────────────────────────────────────────────────
# apiVersion: v1
# kind: Secret
# metadata:
#   name: eazybank-registry-secret
#   namespace: eazybank
# type: kubernetes.io/dockerconfigjson
# data:
#   .dockerconfigjson: <base64 of {"auths":{"https://index.docker.io/v1/":{"auth":"base64(user:token)"}}}>
