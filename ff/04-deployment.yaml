# ─────────────────────────────────────────────────────────────────
#  EazyBank Frontend — Production Deployment
#  Features:
#    • 3 replicas with pod anti-affinity (spread across nodes/zones)
#    • Non-root security context
#    • All three probes (startup, liveness, readiness)
#    • Nginx-prometheus-exporter sidecar
#    • Resource requests/limits
#    • Rolling update strategy
#    • Topology spread constraints
# ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eazybank-frontend
  namespace: eazybank
  labels:
    app.kubernetes.io/name: eazybank-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/managed-by: kubectl
    team: platform
  annotations:
    deployment.kubernetes.io/revision: "1"
    # Trigger rolling restart on configmap change (use Reloader in prod)
    configmap.reloader.stakater.com/reload: "eazybank-nginx-config,eazybank-frontend-config"
spec:
  replicas: 3

  selector:
    matchLabels:
      app.kubernetes.io/name: eazybank-frontend

  # ── Rolling update — zero downtime ───────────────────────────────
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1          # allow 1 extra pod during update
      maxUnavailable: 0    # never take a pod down before new one is ready

  # ── Pod revision history ──────────────────────────────────────────
  revisionHistoryLimit: 5

  template:
    metadata:
      labels:
        app.kubernetes.io/name: eazybank-frontend
        app.kubernetes.io/component: frontend
        app.kubernetes.io/version: "2.0.0"
        team: platform
      annotations:
        # Force pod restart when ConfigMap changes (works with Reloader)
        checksum/nginx-config:    "{{ include (print $.Template.BasePath \"/02-configmap.yaml\") . | sha256sum }}"
        # Prometheus scrape annotations
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9113"
        prometheus.io/path:   "/metrics"

    spec:
      serviceAccountName: eazybank-frontend-sa
      automountServiceAccountToken: false

      # ── Image pull secret ─────────────────────────────────────────
      imagePullSecrets:
        - name: eazybank-registry-secret

      # ── Security Context (Pod level) ──────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser:    101          # nginx user in alpine image
        runAsGroup:   101
        fsGroup:      101
        seccompProfile:
          type: RuntimeDefault

      # ── Topology spread — spread across zones ─────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: eazybank-frontend
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: eazybank-frontend

      # ── Pod anti-affinity (belt+braces with topology spread) ──────
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: eazybank-frontend
                topologyKey: kubernetes.io/hostname

      # ── Node tolerations (if using dedicated frontend node group) ─
      # tolerations:
      #   - key: "frontend"
      #     operator: "Equal"
      #     value: "true"
      #     effect: "NoSchedule"

      # ── Grace period ──────────────────────────────────────────────
      terminationGracePeriodSeconds: 30

      # ── Init container — validate config before main starts ───────
      initContainers:
        - name: config-validator
          image: nginx:1.25.3-alpine
          command:
            - sh
            - -c
            - |
              echo "Validating nginx config..."
              nginx -t -c /etc/nginx/nginx.conf && echo "Config OK"
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: frontend-config
              mountPath: /etc/nginx/conf.d/config.js
              subPath: config.js
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]

      # ── Main containers ───────────────────────────────────────────
      containers:

        # ── Nginx (main) ────────────────────────────────────────────
        - name: nginx
          image: eazybytes/eazybank-frontend:2.0.0
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          # ── Startup probe — give nginx time to start ─────────────
          startupProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12    # 60s total before giving up
            timeoutSeconds: 3

          # ── Liveness probe — restart if stuck ────────────────────
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
            successThreshold: 1

          # ── Readiness probe — remove from LB if not ready ────────
          readinessProbe:
            httpGet:
              path: /readyz
              port: 80
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
            successThreshold: 1

          # ── Resources ─────────────────────────────────────────────
          resources:
            requests:
              cpu:    "100m"
              memory: "64Mi"
            limits:
              cpu:    "500m"
              memory: "128Mi"

          # ── Security context (container level) ───────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # nginx needs /tmp writes
            capabilities:
              drop: ["ALL"]
              add:  ["NET_BIND_SERVICE"]    # only if using port 80 directly

          # ── Volume mounts ─────────────────────────────────────────
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: frontend-config
              mountPath: /etc/nginx/conf.d/config.js
              subPath: config.js
              readOnly: true
            - name: tmp-dir
              mountPath: /tmp
            - name: nginx-logs
              mountPath: /var/log/nginx

          # ── Lifecycle hook — graceful drain ───────────────────────
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5 && nginx -s quit"]

        # ── Nginx Prometheus Exporter sidecar ────────────────────────
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.1.0
          args:
            - -nginx.scrape-uri=http://localhost/stub_status
          ports:
            - name: metrics
              containerPort: 9113
              protocol: TCP
          resources:
            requests:
              cpu:    "10m"
              memory: "16Mi"
            limits:
              cpu:    "50m"
              memory: "32Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9113
            initialDelaySeconds: 10
            periodSeconds: 30

        # ── Filebeat sidecar — ship nginx logs to Logstash ───────────
        - name: filebeat
          image: docker.elastic.co/beats/filebeat:8.11.3
          args:
            - -c
            - /etc/filebeat/filebeat.yml
            - -e
            - --strict.perms=false
          volumeMounts:
            - name: nginx-logs
              mountPath: /var/log/nginx
              readOnly: true
            - name: filebeat-config
              mountPath: /etc/filebeat
              readOnly: true
          resources:
            requests:
              cpu:    "20m"
              memory: "64Mi"
            limits:
              cpu:    "100m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]

      # ── Volumes ───────────────────────────────────────────────────
      volumes:
        - name: nginx-config
          configMap:
            name: eazybank-nginx-config
            items:
              - key: nginx.conf
                path: nginx.conf

        - name: frontend-config
          configMap:
            name: eazybank-frontend-config
            items:
              - key: config.js
                path: config.js

        - name: filebeat-config
          configMap:
            name: eazybank-filebeat-config

        - name: tmp-dir
          emptyDir: {}

        - name: nginx-logs
          emptyDir: {}
