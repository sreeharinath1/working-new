# ─────────────────────────────────────────────────────────────────
#  EazyBank Frontend — Namespace, ResourceQuota, LimitRange
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: eazybank
  labels:
    app.kubernetes.io/name: eazybank
    environment: production
    team: platform
    # Pod Security Standards — baseline for frontend namespace
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
# ── Resource Quota ────────────────────────────────────────────────
apiVersion: v1
kind: ResourceQuota
metadata:
  name: eazybank-quota
  namespace: eazybank
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 4Gi
    limits.cpu: "8"
    limits.memory: 8Gi
    pods: "20"
    services: "10"
    persistentvolumeclaims: "5"
    count/deployments.apps: "10"
    count/horizontalpodautoscalers.autoscaling: "10"
---
# ── LimitRange (per-container defaults) ──────────────────────────
apiVersion: v1
kind: LimitRange
metadata:
  name: eazybank-limits
  namespace: eazybank
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "256Mi"
      defaultRequest:
        cpu: "100m"
        memory: "64Mi"
      max:
        cpu: "2"
        memory: "1Gi"
      min:
        cpu: "50m"
        memory: "32Mi"
    - type: Pod
      max:
        cpu: "4"
        memory: "2Gi"
